<!DOCTYPE html>
<html>
<head>

<title>AI Translator</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:500px;
text-align:center;
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

select{
width:100%;
padding:10px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
font-size:16px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}

.result{
margin-top:20px;
padding:15px;
background:#f1f3f6;
border-radius:8px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h1>🌍 AI Language Translator</h1>

<form method="POST">

<textarea name="text" placeholder="Enter English text">{{ request.form.text }}</textarea>

<select name="language">

<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ru">Russian</option>
<option value="zh">Chinese</option>
<option value="ja">Japanese</option>

</select>

<button type="submit">Translate</button>

</form>

{% if translated %}

<div class="result">

<h3>Translated Text</h3>

<p>{{ translated }}</p>

</div>

{% endif %}

</div>

</body>
</html>
