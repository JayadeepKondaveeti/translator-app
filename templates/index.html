<!DOCTYPE html>
<html>
<head>

<title>Live Voice Translator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:550px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
}

.box{
margin-top:20px;
padding:15px;
background:#f2f2f2;
border-radius:8px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>🎤 Live Voice Translator</h2>

<select id="language">

<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ru">Russian</option>
<option value="zh-CN">Chinese</option>
<option value="ja">Japanese</option>

</select>

<button onclick="startListening()">🎤 Start Speaking</button>

<div class="box">

<b>Recognized Speech:</b>

<p id="speech"></p>

</div>

<div class="box">

<b>Live Translation:</b>

<p id="translation"></p>

</div>

</div>

<script>

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.continuous = true;
recognition.lang = "en-US";

function startListening(){

recognition.start();

}

recognition.onresult = function(event){

let text = event.results[event.results.length - 1][0].transcript;

document.getElementById("speech").innerText = text;

let language = document.getElementById("language").value;

fetch("/translate", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text,
language:language
})

})
.then(res=>res.json())
.then(data=>{

document.getElementById("translation").innerText = data.translated;

});

};

</script>

</body>
</html>
