<!DOCTYPE html>
<html>
<head>
<title>AI Translator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#667eea;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#f2f2f2;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>🌍 AI Language Translator</h2>

<form method="POST">

<textarea name="text" placeholder="Enter English text"></textarea>

<select name="language">

<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ru">Russian</option>
<option value="zh-CN">Chinese</option>
<option value="ja">Japanese</option>

</select>

<button type="submit">Translate</button>

</form>

{% if translated %}

<div class="result">

<b>Translated Text:</b>

<p>{{ translated }}</p>

</div>

{% endif %}

</div>

</body>
</html>
